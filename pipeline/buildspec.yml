version: 0.2

phases:
  pre_build:
    commands:
      - AWS_ACCOUNT_ID=$(aws sts get-caller-identity --query Account --output text)
      - ECR_HOST="${AWS_ACCOUNT_ID}.dkr.ecr.${AWS_DEFAULT_REGION}.amazonaws.com"
      - aws ecr get-login-password --region ${AWS_DEFAULT_REGION} | docker login --username AWS --password-stdin ${ECR_HOST}
      - COMMIT_SHA=$(echo ${CODEBUILD_RESOLVED_SOURCE_VERSION} | cut -c1-8)
      - BUILD_TIME=$(date -u +'%Y-%m-%dT%H:%M:%SZ')
      - IMAGE_URI="${ECR_REPOSITORY_URI}:${COMMIT_SHA}"
      - echo "Image URI = ${IMAGE_URI}"

  build:
    commands:
      - docker build --build-arg VERSION="${COMMIT_SHA}" --build-arg COMMIT_SHA="${COMMIT_SHA}" --build-arg BUILD_TIME="${BUILD_TIME}" -t "${IMAGE_URI}" ./app
      - docker tag "${IMAGE_URI}" "${ECR_REPOSITORY_URI}:latest"

  post_build:
    commands:
      - docker push "${IMAGE_URI}"
      - docker push "${ECR_REPOSITORY_URI}:latest"
      - sed "s|<IMAGE_URI>|${IMAGE_URI}|g" pipeline/taskdef.json > taskdef.json
      - cp pipeline/appspec.yaml appspec.yaml
      - echo "Build complete. Image = ${IMAGE_URI}"

artifacts:
  files:
    - taskdef.json
    - appspec.yaml
  discard-paths: yes