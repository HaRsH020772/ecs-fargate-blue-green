version: 0.2

phases:
  pre_build:
    commands:
      - echo "=== PRE-BUILD: ECR login ==="
      - AWS_ACCOUNT_ID=$(aws sts get-caller-identity --query Account --output text)
      - ECR_HOST="${AWS_ACCOUNT_ID}.dkr.ecr.${AWS_DEFAULT_REGION}.amazonaws.com"
      - aws ecr get-login-password --region ${AWS_DEFAULT_REGION} | docker login --username AWS --password-stdin ${ECR_HOST}
      # Short 8-char commit SHA used as the image tag
      - COMMIT_SHA=$(echo ${CODEBUILD_RESOLVED_SOURCE_VERSION} | cut -c1-8)
      - BUILD_TIME=$(date -u +"%Y-%m-%dT%H:%M:%SZ")
      - IMAGE_TAG=${COMMIT_SHA}
      - IMAGE_URI="${ECR_REPOSITORY_URI}:${IMAGE_TAG}"
      - echo "Image URI = ${IMAGE_URI}"

  build:
    commands:
      - echo "=== BUILD: Docker image ==="
      - |
        docker build \
          --build-arg VERSION="${IMAGE_TAG}" \
          --build-arg COMMIT_SHA="${COMMIT_SHA}" \
          --build-arg BUILD_TIME="${BUILD_TIME}" \
          -t "${IMAGE_URI}" \
          ./app
      - docker tag "${IMAGE_URI}" "${ECR_REPOSITORY_URI}:latest"

  post_build:
    commands:
      - echo "=== POST-BUILD: Push + write artifacts ==="
      - docker push "${IMAGE_URI}"
      - docker push "${ECR_REPOSITORY_URI}:latest"
      # Replace <IMAGE_URI> placeholder in the task definition template
      - sed "s|<IMAGE_URI>|${IMAGE_URI}|g" pipeline/taskdef.json > taskdef.json
      # appspec.yaml is static — copy as-is
      - cp pipeline/appspec.yaml appspec.yaml
      - echo "Artifacts ready:"
      - cat taskdef.json
      - echo "Build finished. Image = ${IMAGE_URI}"

# CodeDeploy blue-green requires exactly these two artifacts
artifacts:
  files:
    - taskdef.json
    - appspec.yaml
  discard-paths: yes
